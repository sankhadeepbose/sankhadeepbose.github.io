<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sankhadeep Bose – Publications</title>
  <meta name="description" content="Publications list of Sankhadeep Bose, PhD candidate in Thermodynamics and Atomistic Simulation.">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/academicons/1.9.1/css/academicons.min.css">
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <div id="header-container"></div>
  <div class="page-wrapper">
    <div id="sidebar-container"></div>
    <main class="main-content" id="main-content">
      <div class="content-section">
        <p class="section-label">Publications</p>
        <div id="pub-list"><p class="loading-msg">Loading publications…</p></div>
      </div>
    </main>
  </div>
  <footer class="site-footer">
    <div class="entropy-game">
      <button class="entropy-btn" id="entropy-btn">Contribute to entropy</button>
      <span class="entropy-msg" id="entropy-msg">The universe awaits.</span>
    </div>
    <p class="footer-copy">&copy; 2025 Sankhadeep Bose</p>
  </footer>
  <script src="components.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/citation-js@0.7.18/build/citation.min.js"></script>
  <script src="entropy.js"></script>
  <script>
    const Cite = require('citation-js');

    function parseBibFields(entry) {
      const fields = {};
      const bodyStart = entry.indexOf('{');
      if (bodyStart === -1) return fields;
      for (const line of entry.slice(bodyStart + 1).split(/\n/)) {
        const t = line.trim();
        if (t.startsWith('}')) break;
        const m = t.match(/^([A-Za-z]+)\s*=\s*[{"'](.+?)["'}],?\s*$/);
        if (m) fields[m[1].toLowerCase()] = m[2].trim();
      }
      return fields;
    }

    function parseMonth(raw) {
      if (!raw) return 0;
      const n = parseInt(raw, 10);
      if (!isNaN(n)) return n;
      const map = { jan:1,feb:2,mar:3,apr:4,may:5,jun:6,jul:7,aug:8,sep:9,oct:10,nov:11,dec:12 };
      return map[raw.toLowerCase().slice(0, 3)] || 0;
    }

    function extractBibKey(entry) {
      const m = entry.match(/^@\w+\s*{\s*([^,]+),/);
      return m ? m[1].trim() : 'entry';
    }

    async function loadPublications() {
      const container = document.getElementById('pub-list');
      try {
        const res = await fetch('publications.bib');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        let bib = (await res.text()).replace(/^\s*%.*$/gm, '').trim();
        if (!bib) throw new Error('Empty bib file');

        const entries = bib.split(/\n@/).filter(e => e.trim()).map(e => {
          const t = e.trim();
          return t.startsWith('@') ? t : '@' + t;
        });

        const cats = { peer: [], thesis: [] };
        entries.forEach(entry => {
          const typeM  = entry.match(/^@(\w+)/i);
          const type   = typeM ? typeM[1].toLowerCase() : '';
          const fields = parseBibFields(entry);
          const item   = { entry, fields, year: parseInt(fields.year, 10) || 0, month: parseMonth(fields.month) };
          (type.includes('thesis') ? cats.thesis : cats.peer).push(item);
        });

        const sortDesc = (a, b) => b.year !== a.year ? b.year - a.year : b.month - a.month;
        cats.peer.sort(sortDesc);
        cats.thesis.sort(sortDesc);

        container.innerHTML = '';

        function renderList(items, heading) {
          if (!items.length) return;

          const h2 = document.createElement('h2');
          h2.className = 'pub-category-heading';
          h2.innerHTML = heading + ` <span class="pub-count" aria-label="${items.length} entries">${items.length}</span>`;
          container.appendChild(h2);

          const ol = document.createElement('ol');
          ol.className = 'pub-list';
          ol.setAttribute('reversed', '');

          items.forEach(({ entry, fields }) => {
            const cite = new Cite(entry);
            let html = cite.format('bibliography', { format: 'html', template: 'apa', lang: 'en-US' });

            const tmp = document.createElement('div');
            tmp.innerHTML = html;
            const cslEl = tmp.querySelector('.csl-entry') || tmp;
            cslEl.querySelectorAll('a').forEach(a => a.remove());
            let h = cslEl.innerHTML;
            h = h.replace(/\s*https?:\/\/doi\.org\/[^\s<]+/gi, '')
                 .replace(/\s*doi\.org\/10\.[^\s<]+/gi, '')
                 .replace(/\s*doi:\s*10\.[^\s<]+/gi, '')
                 .replace(/\s*https?:\/\/[^\s<]+/gi, '')
                 .replace(/\s{2,}/g, ' ').trim();

            if (heading === 'Theses') {
              h = h.replace('Vellore Institute of Technology',
                            "Master's thesis, Vellore Institute of Technology");
            }
            h = h.replace(/Bose, S\./g, '<strong>Bose, S.</strong>');

            const li      = document.createElement('li');
            li.className  = 'pub-item';
            const numSpan = document.createElement('span');
            numSpan.className = 'pub-num';
            const body    = document.createElement('div');
            body.className = 'pub-body';
            const citP    = document.createElement('p');
            citP.className = 'pub-citation';
            citP.innerHTML = h;
            const linksDiv = document.createElement('div');
            linksDiv.className = 'pub-links';

            let pdfUrl;
            if (heading === 'Theses') {
              pdfUrl = 'https://zenodo.org/records/3911784/files/Thesis_Sankhadeep_Bose_2020.pdf?download=1';
            } else if (fields.doi === '10.1021/acsnano.0c05892') {
              pdfUrl = 'https://repository.lincoln.ac.uk/ndownloader/files/42850540';
            } else if (fields.doi === '10.1021/acsomega.4c11379') {
              pdfUrl = 'https://pubs.acs.org/doi/pdf/10.1021/acsomega.4c11379?ref=article_openPDF';
            } else if (fields.doi === '10.1063/5.0280263') {
              pdfUrl = 'https://repository.lincoln.ac.uk/ndownloader/files/58731724';
            } else {
              pdfUrl = fields.eprint || fields.url || fields.URL ||
                       (fields.doi ? 'https://doi.org/' + fields.doi : '');
            }

            if (pdfUrl) {
              const a = document.createElement('a');
              a.className = 'pub-btn pub-btn-pdf';
              a.href = pdfUrl; a.target = '_blank'; a.rel = 'noopener';
              a.innerHTML = '<i class="fas fa-file-pdf" aria-hidden="true"></i> PDF';
              linksDiv.appendChild(a);
            }

            const webUrl = fields.url || fields.URL || (fields.doi ? 'https://doi.org/' + fields.doi : '');
            if (webUrl) {
              const a = document.createElement('a');
              a.className = 'pub-btn pub-btn-article';
              a.href = webUrl; a.target = '_blank'; a.rel = 'noopener';
              a.innerHTML = '<i class="fas fa-external-link-alt" aria-hidden="true"></i> Article';
              linksDiv.appendChild(a);
            }

            const key  = extractBibKey(entry);
            const aBib = document.createElement('a');
            aBib.className = 'pub-btn pub-btn-bib';
            aBib.innerHTML = '<i class="fas fa-quote-right" aria-hidden="true"></i> BibTeX';
            aBib.href = 'data:text/plain;charset=utf-8,' + encodeURIComponent(entry.trim() + '\n');
            aBib.download = key + '.bib';
            linksDiv.appendChild(aBib);

            body.appendChild(citP);
            body.appendChild(linksDiv);
            li.appendChild(numSpan);
            li.appendChild(body);
            ol.appendChild(li);
          });

          container.appendChild(ol);
        }

        renderList(cats.peer,   'In Peer-Reviewed Journals');
        renderList(cats.thesis, 'Theses');
      } catch (err) {
        console.error(err);
        container.innerHTML = '<p class="loading-msg">Unable to load publications. Please check the .bib file.</p>';
      }
    }

    document.addEventListener('DOMContentLoaded', loadPublications);
  </script>
</body>
</html>
